<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A090"/>
      <stop offset="100%" stop-color="#C9907A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Ledger book lines -->
  <rect x="120" y="140" width="272" height="16" rx="8" fill="rgba(255,255,255,0.35)"/>
  <rect x="120" y="188" width="200" height="16" rx="8" fill="rgba(255,255,255,0.25)"/>
  <rect x="120" y="236" width="240" height="16" rx="8" fill="rgba(255,255,255,0.25)"/>
  <rect x="120" y="284" width="180" height="16" rx="8" fill="rgba(255,255,255,0.25)"/>
  <!-- Dollar sign -->
  <text x="340" y="390" font-size="200" text-anchor="middle" fill="white" font-family="Georgia,serif" font-weight="700" opacity="0.92">$</text>
</svg>
