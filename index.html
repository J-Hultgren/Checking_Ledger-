<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Checking Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F9F3EE;font-family:'Lato',sans-serif;color:#3D2E26}
input[type=number]::-webkit-inner-spin-button,
input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:0}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useMemo}=React;

const SB=window.supabase.createClient(
  "https://irmtvjxlntozigbqxhvm.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlybXR2anhsbnRvemlnYnF4aHZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NTkzMTQsImV4cCI6MjA5MjQzNTMxNH0.nyIZx7Z0GnHEIlZpBlN6TzHHsf7tGuhdvWECdpcQ-a0"
);

const C={
  blush:"#C9907A",sage:"#7A9A80",mist:"#9A7890",
  text:"#3D2E26",lt:"#B09080",sub:"#967060",
  danger:"#C05040",card:"rgba(255,255,255,0.82)",
  border:"rgba(255,255,255,0.92)",div:"rgba(201,144,122,0.12)"
};

const fmt=v=>v===null||v===undefined?"—":
  new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(v);

const fmtDate=s=>{
  if(!s)return"";
  const d=new Date(s+"T12:00:00");
  return d.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
};

const today=()=>new Date().toISOString().split("T")[0];

const PRESETS=[
  "TP Paycheck","XE Paycheck","Mortgage Draft","Avant","SoFi","Upstart",
  "Upgrade","Best Egg","Affirm","Citi AA","Citi","Barclay","Amex",
  "Dance","SCU Equity","Google Fi","Fidium + Netflix","YouTube Premium",
  "Hulu","LFOD","EZ Pass Reload","Arlo Security","Trading",
  "Tax Savings","House","Investing"
];

const DAYS=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];

async function dbGet(k){
  const{data,error}=await SB.from("budget_data").select("*").eq("id","lgr-"+k).single();
  return(!data||error)?null:data;
}
async function dbSet(k,v){
  await SB.from("budget_data").upsert({
    id:"lgr-"+k,month:0,year:0,income:0,
    budgets:v,actuals:{},updated_at:new Date().toISOString()
  });
}

function App(){
  const now=new Date();
  const [tab,setTab]=useState("ledger");
  const [loading,setLoading]=useState(true);
  const [sync,setSync]=useState("idle");
  const [txns,setTxns]=useState([]);
  const [lcStart,setLcStart]=useState(3385);
  const [scuStart,setScuStart]=useState(1522.99);
  const [showForm,setShowForm]=useState(false);
  const [editId,setEditId]=useState(null);
  const [filter,setFilter]=useState({desc:"",acct:"all"});
  const tmr=useRef({});

  useEffect(()=>{
    (async()=>{
      setLoading(true);
      try{
        const[tR,sR]=await Promise.all([dbGet("txns"),dbGet("settings")]);
        if(tR?.budgets?.txns)setTxns(tR.budgets.txns);
        if(sR?.budgets?.lcStart!==undefined)setLcStart(sR.budgets.lcStart);
        if(sR?.budgets?.scuStart!==undefined)setScuStart(sR.budgets.scuStart);
      }catch(e){console.error(e);}
      setLoading(false);
    })();
  },[]);

  function save(key,fn){
    clearTimeout(tmr.current[key]);
    tmr.current[key]=setTimeout(async()=>{
      setSync("saving");
      try{await fn();setSync("saved");setTimeout(()=>setSync("idle"),2500);}
      catch{setSync("error");}
    },600);
  }

  function saveTxns(t){save("t",()=>dbSet("txns",{txns:t}));}
  function saveSettings(lc,scu){save("s",()=>dbSet("settings",{lcStart:lc,scuStart:scu}));}

  function addTxn(f){
    const t=[...txns,{id:Date.now().toString(),...f,amount:parseFloat(f.amount)||0}]
      .sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
    setTxns(t);saveTxns(t);setShowForm(false);
  }

  function delTxn(id){
    if(!confirm("Delete this transaction?"))return;
    const t=txns.filter(x=>x.id!==id);
    setTxns(t);saveTxns(t);
  }

  function editTxn(f){
    const t=txns.map(x=>x.id===f.id?{...f,amount:parseFloat(f.amount)||0}:x)
      .sort((a,b)=>a.date<b.date?-1:a.date>b.date?1:0);
    setTxns(t);saveTxns(t);setEditId(null);
  }

  function onStartChange(acct,val){
    const v=parseFloat(val)||0;
    if(acct==="lc"){setLcStart(v);saveSettings(v,scuStart);}
    else{setScuStart(v);saveSettings(lcStart,v);}
  }

  // Compute running balances
  const withBal=useMemo(()=>{
    let lc=lcStart,scu=scuStart;
    return txns.map(t=>{
      if(t.account==="lc")lc=Math.round((lc+t.amount)*100)/100;
      else scu=Math.round((scu+t.amount)*100)/100;
      return{...t,
        thisBal:t.account==="lc"?lc:scu,
        lcNow:lc,scuNow:scu
      };
    });
  },[txns,lcStart,scuStart]);

  const lastLc=withBal.length?withBal[withBal.length-1].lcNow:lcStart;
  const lastScu=withBal.length?withBal[withBal.length-1].scuNow:scuStart;

  const filtered=useMemo(()=>{
    let r=withBal;
    if(filter.acct!=="all")r=r.filter(t=>t.account===filter.acct);
    if(filter.desc)r=r.filter(t=>t.desc.toLowerCase().includes(filter.desc.toLowerCase()));
    return r;
  },[withBal,filter]);

  const dateStr=`${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
  const syncLabel={idle:"",saving:"Saving…",saved:"✓ Synced",error:"⚠ Error"}[sync];
  const syncColor={idle:"transparent",saving:C.blush,saved:C.sage,error:C.danger}[sync];

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#F9F3EE,#EDE3DA)",paddingBottom:40}}>

      {/* Header */}
      <div style={{position:"sticky",top:0,zIndex:20,background:"rgba(255,255,255,0.93)",backdropFilter:"blur(14px)",borderBottom:`1px solid ${C.div}`,padding:"12px 16px 10px"}}>
        <div style={{fontSize:11,color:C.blush,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:2}}>{dateStr}</div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700}}>Checking Ledger</div>
          <div style={{fontSize:11,color:syncColor}}>{syncLabel}</div>
        </div>

        {/* Balances */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          {[
            {l:"LC Checking",v:lastLc,c:C.blush},
            {l:"SCU Checking",v:lastScu,c:C.sage},
            {l:"Combined",v:lastLc+lastScu,c:C.mist}
          ].map((a,i)=>(
            <div key={i} style={{flex:1,background:a.c+"14",borderRadius:11,padding:"8px 9px",border:`1.5px solid ${a.c}22`}}>
              <div style={{fontSize:9,color:C.lt,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:2}}>{a.l}</div>
              <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:15,fontWeight:700,color:a.c}}>{fmt(a.v)}</div>
            </div>
          ))}
        </div>

        {/* Tabs */}
        <div style={{display:"flex",gap:6}}>
          {[{id:"ledger",l:"📒 Ledger"},{id:"settings",l:"⚙️ Settings"}].map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:"5px 14px",borderRadius:20,border:`1.5px solid ${tab===t.id?C.blush+"50":C.div}`,background:tab===t.id?C.blush+"14":"transparent",fontSize:12,fontWeight:tab===t.id?700:400,color:tab===t.id?C.blush:C.lt,cursor:"pointer"}}>
              {t.l}
            </button>
          ))}
        </div>
      </div>

      {/* Pages */}
      <div style={{maxWidth:560,margin:"0 auto",padding:"14px 14px 0"}}>
        {loading?(
          <div style={{textAlign:"center",padding:60,fontFamily:"'Cormorant Garamond',serif",fontSize:24,color:C.lt}}>Loading…</div>
        ):tab==="ledger"?(
          <LedgerPage C={C} filtered={filtered} txns={txns} showForm={showForm}
            setShowForm={setShowForm} addTxn={addTxn} delTxn={delTxn} editTxn={editTxn}
            editId={editId} setEditId={setEditId} filter={filter} setFilter={setFilter}/>
        ):(
          <SettingsPage C={C} lcStart={lcStart} scuStart={scuStart} onStartChange={onStartChange}/>
        )}
      </div>
    </div>
  );
}

// ── FORM ─────────────────────────────────────────────────────────
function TxnForm({C,init,onSave,onCancel,title}){
  const [f,setF]=useState(init||{date:today(),desc:"",amount:"",account:"lc",note:""});
  const [showP,setShowP]=useState(false);
  const isPos=parseFloat(f.amount)>=0;

  return(
    <div style={{background:C.card,borderRadius:18,padding:"16px",border:`1px solid ${C.border}`,marginBottom:12,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:18,fontWeight:600,marginBottom:14}}>{title||"Add Transaction"}</div>

      {/* Date + Account */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:8}}>
        <div>
          <div style={{fontSize:10,color:C.lt,marginBottom:3}}>Date</div>
          <input type="date" value={f.date} onChange={e=>setF(x=>({...x,date:e.target.value}))}
            style={{width:"100%",padding:"8px 10px",borderRadius:10,border:`1.5px solid ${C.blush}30`,background:C.blush+"08",fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div>
          <div style={{fontSize:10,color:C.lt,marginBottom:3}}>Account</div>
          <div style={{display:"flex",gap:5}}>
            {[{v:"lc",l:"LC",c:C.blush},{v:"scu",l:"SCU",c:C.sage}].map(a=>(
              <button key={a.v} onClick={()=>setF(x=>({...x,account:a.v}))}
                style={{flex:1,padding:"8px 4px",borderRadius:9,border:`1.5px solid ${a.c}${f.account===a.v?"55":"22"}`,background:f.account===a.v?a.c+"18":"transparent",fontSize:13,fontWeight:f.account===a.v?700:400,color:a.c,cursor:"pointer"}}>
                {a.l}
              </button>
            ))}
          </div>
        </div>
      </div>

      {/* Description */}
      <div style={{marginBottom:8}}>
        <div style={{fontSize:10,color:C.lt,marginBottom:3}}>Description</div>
        <input value={f.desc} onChange={e=>setF(x=>({...x,desc:e.target.value}))}
          onFocus={()=>setShowP(true)} placeholder="e.g. TP Paycheck, Mortgage…"
          style={{width:"100%",padding:"8px 10px",borderRadius:10,border:`1.5px solid ${C.blush}30`,background:C.blush+"08",fontSize:13,color:C.text,outline:"none",boxSizing:"border-box"}}/>
        {showP&&(
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:6}}>
            {PRESETS.filter(p=>!f.desc||p.toLowerCase().includes(f.desc.toLowerCase())).slice(0,14).map(p=>(
              <button key={p} onClick={()=>{setF(x=>({...x,desc:p}));setShowP(false);}}
                style={{padding:"3px 10px",borderRadius:99,border:`1px solid ${C.blush}28`,background:C.blush+"09",fontSize:11,color:C.sub,cursor:"pointer"}}>{p}</button>
            ))}
            <button onClick={()=>setShowP(false)}
              style={{padding:"3px 8px",borderRadius:99,border:`1px solid ${C.div}`,background:"transparent",fontSize:10,color:C.lt,cursor:"pointer"}}>✕</button>
          </div>
        )}
      </div>

      {/* Amount */}
      <div style={{marginBottom:10}}>
        <div style={{fontSize:10,color:C.lt,marginBottom:3}}>Amount <span style={{fontWeight:400}}>(− withdrawal, + deposit)</span></div>
        <div style={{position:"relative"}}>
          <span style={{position:"absolute",left:10,top:"50%",transform:"translateY(-50%)",fontSize:16,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,color:isPos?C.sage:C.danger}}>$</span>
          <input type="number" step="0.01" value={f.amount} onChange={e=>setF(x=>({...x,amount:e.target.value}))}
            placeholder="0.00"
            style={{width:"100%",padding:"9px 10px 9px 26px",borderRadius:10,border:`1.5px solid ${isPos?C.sage:C.danger}30`,background:isPos?C.sage+"08":C.danger+"06",fontSize:20,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:isPos?C.sage:C.danger,outline:"none",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:6,marginTop:6}}>
          <button onClick={()=>setF(x=>({...x,amount:"-"+Math.abs(parseFloat(x.amount)||0)}))}
            style={{flex:1,padding:"5px",borderRadius:8,border:`1px solid ${C.danger}28`,background:C.danger+"08",fontSize:11,color:C.danger,cursor:"pointer",fontWeight:600}}>− Withdrawal</button>
          <button onClick={()=>setF(x=>({...x,amount:Math.abs(parseFloat(x.amount)||0)}))}
            style={{flex:1,padding:"5px",borderRadius:8,border:`1px solid ${C.sage}28`,background:C.sage+"08",fontSize:11,color:C.sage,cursor:"pointer",fontWeight:600}}>+ Deposit</button>
        </div>
      </div>

      {/* Note */}
      <div style={{marginBottom:14}}>
        <div style={{fontSize:10,color:C.lt,marginBottom:3}}>Note (optional)</div>
        <input value={f.note||""} onChange={e=>setF(x=>({...x,note:e.target.value}))}
          placeholder="Optional note…"
          style={{width:"100%",padding:"7px 10px",borderRadius:10,border:`1.5px solid ${C.div}`,background:"rgba(255,255,255,0.5)",fontSize:12,color:C.text,outline:"none",boxSizing:"border-box"}}/>
      </div>

      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>onSave(f)}
          style={{flex:1,padding:"11px",borderRadius:11,background:C.blush+"20",border:`1.5px solid ${C.blush}45`,fontSize:13,fontWeight:700,color:C.blush,cursor:"pointer"}}>
          Save
        </button>
        <button onClick={onCancel}
          style={{padding:"11px 18px",borderRadius:11,border:`1px solid ${C.div}`,background:"transparent",fontSize:13,color:C.lt,cursor:"pointer"}}>
          Cancel
        </button>
      </div>
    </div>
  );
}

// ── LEDGER PAGE ───────────────────────────────────────────────────
function LedgerPage({C,filtered,txns,showForm,setShowForm,addTxn,delTxn,editTxn,editId,setEditId,filter,setFilter}){
  const grouped=useMemo(()=>{
    const map={};
    [...filtered].reverse().forEach(t=>{
      const k=t.date?t.date.slice(0,7):"?";
      if(!map[k])map[k]=[];
      map[k].push(t);
    });
    return Object.entries(map).sort(([a],[b])=>b.localeCompare(a));
  },[filtered]);

  return(
    <div>
      {!showForm&&!editId&&(
        <button onClick={()=>setShowForm(true)}
          style={{width:"100%",marginBottom:12,padding:"12px",borderRadius:14,background:C.blush+"10",border:`1.5px dashed ${C.blush}45`,fontSize:14,fontWeight:700,color:C.blush,cursor:"pointer"}}>
          + Add Transaction
        </button>
      )}

      {showForm&&(
        <TxnForm C={C} onSave={addTxn} onCancel={()=>setShowForm(false)}/>
      )}

      {/* Filter bar */}
      {!showForm&&!editId&&(
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <input value={filter.desc} onChange={e=>setFilter(f=>({...f,desc:e.target.value}))}
            placeholder="🔍 Search…"
            style={{flex:1,padding:"8px 12px",borderRadius:10,border:`1.5px solid ${C.div}`,background:"rgba(255,255,255,0.7)",fontSize:12,color:C.text,outline:"none"}}/>
          <div style={{display:"flex",gap:4}}>
            {[["all","All"],["lc","LC"],["scu","SCU"]].map(([v,l])=>(
              <button key={v} onClick={()=>setFilter(f=>({...f,acct:v}))}
                style={{padding:"7px 10px",borderRadius:9,border:`1.5px solid ${filter.acct===v?C.blush+"50":C.div}`,background:filter.acct===v?C.blush+"14":"rgba(255,255,255,0.6)",fontSize:11,fontWeight:filter.acct===v?700:400,color:filter.acct===v?C.blush:C.lt,cursor:"pointer"}}>
                {l}
              </button>
            ))}
          </div>
        </div>
      )}

      {grouped.length===0&&!showForm&&(
        <div style={{textAlign:"center",padding:"50px 20px",color:C.lt}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,marginBottom:8}}>No transactions yet</div>
          <div style={{fontSize:13}}>Tap + Add Transaction to get started</div>
        </div>
      )}

      {grouped.map(([monthKey,rows])=>{
        const d=new Date(monthKey+"-15");
        const label=d.toLocaleDateString("en-US",{month:"long",year:"numeric"});
        const deps=rows.reduce((s,t)=>s+(t.amount>0?t.amount:0),0);
        const wds=rows.reduce((s,t)=>s+(t.amount<0?t.amount:0),0);
        return(
          <div key={monthKey} style={{marginBottom:18}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 12px",background:C.blush+"12",borderRadius:12,border:`1px solid ${C.blush}20`,marginBottom:8}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:17,fontWeight:700}}>{label}</span>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:10,color:C.sage,fontWeight:700}}>+{fmt(deps)}</div>
                <div style={{fontSize:10,color:C.danger,fontWeight:700}}>{fmt(wds)}</div>
              </div>
            </div>

            {rows.map(t=>{
              const col=t.account==="lc"?C.blush:C.sage;
              const neg=t.amount<0;
              if(editId===t.id){
                return(
                  <TxnForm key={t.id} C={C} init={{...t,amount:t.amount}} title="Edit Transaction"
                    onSave={editTxn} onCancel={()=>setEditId(null)}/>
                );
              }
              return(
                <div key={t.id} style={{display:"flex",alignItems:"center",gap:8,background:C.card,borderRadius:12,padding:"10px 12px",border:`1px solid ${C.border}`,marginBottom:5,boxShadow:"0 1px 6px rgba(0,0,0,.04)"}}>
                  <div style={{width:8,height:8,borderRadius:"50%",background:col,flexShrink:0}}/>
                  <div style={{fontSize:11,color:C.lt,flexShrink:0,minWidth:72}}>{fmtDate(t.date)}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.desc}</div>
                    {t.note&&<div style={{fontSize:10,color:C.lt,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.note}</div>}
                    <div style={{fontSize:9,color:col,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>{t.account==="lc"?"LC":"SCU"} · Bal: {fmt(t.thisBal)}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:16,fontWeight:700,color:neg?C.danger:C.sage}}>
                      {neg?"":"+"}{ new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",minimumFractionDigits:2}).format(t.amount)}
                    </div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:3,flexShrink:0}}>
                    <button onClick={()=>setEditId(t.id)} style={{fontSize:12,background:"none",border:"none",cursor:"pointer",color:C.lt,padding:"2px"}}>✏️</button>
                    <button onClick={()=>delTxn(t.id)} style={{fontSize:12,background:"none",border:"none",cursor:"pointer",color:C.danger,padding:"2px"}}>×</button>
                  </div>
                </div>
              );
            })}
          </div>
        );
      })}
    </div>
  );
}

// ── SETTINGS PAGE ─────────────────────────────────────────────────
function SettingsPage({C,lcStart,scuStart,onStartChange}){
  return(
    <div>
      <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:24,fontWeight:700,marginBottom:14}}>Settings</div>
      <div style={{background:C.card,borderRadius:18,padding:"18px",border:`1px solid ${C.border}`,marginBottom:14,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:10,color:C.lt,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:14}}>Starting Balances</div>
        <div style={{fontSize:12,color:C.sub,marginBottom:16,lineHeight:1.6}}>Set the opening balance for each account. Running balances calculate from here.</div>
        {[{k:"lc",l:"LC / Main Checking (X-Energy)",c:C.blush,v:lcStart},{k:"scu",l:"SCU Checking (TerraPower)",c:C.sage,v:scuStart}].map(a=>(
          <div key={a.k} style={{marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:7}}>
              <div style={{width:10,height:10,borderRadius:"50%",background:a.c}}/>
              <span style={{fontSize:13,fontWeight:600}}>{a.l}</span>
            </div>
            <div style={{position:"relative"}}>
              <span style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",fontSize:20,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,color:a.c}}>$</span>
              <input type="number" step="0.01" value={a.v} onChange={e=>onStartChange(a.k,e.target.value)}
                style={{width:"100%",padding:"10px 10px 10px 28px",borderRadius:12,border:`1.5px solid ${a.c}35`,background:a.c+"0E",fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:700,color:a.c,outline:"none",boxSizing:"border-box"}}/>
            </div>
          </div>
        ))}
      </div>
      <div style={{background:C.card,borderRadius:18,padding:"16px 18px",border:`1px solid ${C.border}`,boxShadow:"0 2px 16px rgba(0,0,0,.07)"}}>
        <div style={{fontSize:10,color:C.lt,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:12}}>How to Use</div>
        {[
          ["📒","Add transactions as they happen","Use − for withdrawals and payments, + for deposits and paychecks."],
          ["🔴🟢","Account color dots","Blush/red = LC Checking · Green = SCU Checking"],
          ["💰","Running balance","Each row shows the balance for that account after the transaction."],
          ["🔍","Filter & search","Search any description or filter to see just LC or SCU transactions."],
          ["✏️ ×","Edit or delete","Correct mistakes any time — balances recalculate automatically."],
        ].map(([ico,title,desc],i)=>(
          <div key={i} style={{display:"flex",gap:10,marginBottom:i<4?12:0}}>
            <span style={{fontSize:17,flexShrink:0,minWidth:28}}>{ico}</span>
            <div>
              <div style={{fontSize:12,fontWeight:700}}>{title}</div>
              <div style={{fontSize:11,color:C.lt,marginTop:2,lineHeight:1.5}}>{desc}</div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
